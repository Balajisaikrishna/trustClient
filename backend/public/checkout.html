<!DOCTYPE html>
<html>
<head>
    <title>TrustClient | Payment</title>
    <link rel="stylesheet" href="/payment.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

    <header class="payment-header">
        <div class="brand">
            <div class="brand-icon">T</div>
            <div class="brand-name">TrustClient</div>
        </div>
    </header>

    <main class="payment-container">

        <div class="payment-card">

            <div class="preview-section">
                <div class="preview-wrapper">
                    <div id="previewContainer">
                        <p>Loading preview...</p>
                    </div>
                    <button class="fullscreen-trigger" id="fullscreenBtn" title="View fullscreen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <polyline points="9 21 3 21 3 15"></polyline>
                            <line x1="21" y1="3" x2="14" y2="10"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="payment-section">

                <span class="badge">Secure Payment</span>

                <h1 id="description">Loading...</h1>

                <p class="price" id="price"></p>

                <p class="info">
                    Complete your payment securely to unlock the original project file.
                </p>

                <button id="payBtn">Pay Now</button>

                <a id="downloadBtn" href="#" style="display:none;">
                    <button type="button">Download Original File</button>
                </a>

            </div>

        </div>

    </main>

    <!-- Glass overlay for fullscreen preview -->
    <div class="glass-overlay" id="glassOverlay">
        <button class="glass-close" id="glassClose" title="Close preview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="glass-content" id="glassContent"></div>
    </div>

    <script>
        const token = window.location.pathname.split('/')[2];

        let previewUrl = null;
        let isVideo = false;

        fetch(`/api/transaction/${token}/preview`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('description').innerText = data.description;
                document.getElementById('price').innerText = `₹${data.price}`;

                previewUrl = data.previewUrl;
                isVideo = data.previewUrl.endsWith('.mp4');

                document.getElementById('previewContainer').innerHTML = isVideo ?
                    `<video src="${data.previewUrl}" controls playsinline></video>` :
                    `<img src="${data.previewUrl}" alt="Preview">`;

                document.getElementById('fullscreenBtn').classList.add('visible');

                if (data.status === 'paid') {
                    document.getElementById('payBtn').style.display = 'none';
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.href = `/transaction/${token}/download`;
                    downloadBtn.style.display = 'block';
                }
            });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!previewUrl) return;

            const previewVideo = document.querySelector('#previewContainer video');
            if (previewVideo) previewVideo.pause();

            const glassContent = document.getElementById('glassContent');
            glassContent.innerHTML = isVideo ?
                `<video src="${previewUrl}" controls autoplay playsinline></video>` :
                `<img src="${previewUrl}" alt="Fullscreen preview">`;

            document.getElementById('glassOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        function closeGlassOverlay() {
            document.getElementById('glassOverlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('glassContent').innerHTML = '';
        }

        document.getElementById('glassClose').addEventListener('click', closeGlassOverlay);

        document.getElementById('glassOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeGlassOverlay();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const overlay = document.getElementById('glassOverlay');
                if (overlay.classList.contains('active')) closeGlassOverlay();
            }
        });

        document.getElementById('payBtn').addEventListener('click', () => {
            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.innerText = 'Loading...';

            fetch(`/transaction/${token}/create-order`, { method: 'POST' })
                .then(res => res.json())
                .then(order => {
                    if (!order.orderId) {
                        alert(order.error || 'Could not start payment');
                        payBtn.disabled = false;
                        payBtn.innerText = 'Pay Now';
                        return;
                    }

                    const options = {
                        key: order.keyId,
                        amount: order.amount,
                        currency: order.currency,
                        order_id: order.orderId,
                        name: 'TrustClient',
                        description: 'Project Payment',
                        handler: function(response) {
                            fetch(`/transaction/${token}/verify`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(response)
                            })
                            .then(res => res.json())
                            .then(result => {
                                if (result.success) {
                                    payBtn.style.display = 'none';
                                    const downloadBtn = document.getElementById('downloadBtn');
                                    downloadBtn.href = `/transaction/${token}/download`;
                                    downloadBtn.style.display = 'block';
                                } else {
                                    alert('Payment verification failed.');
                                }
                            });
                        },
                        modal: {
                            ondismiss: function() {
                                payBtn.disabled = false;
                                payBtn.innerText = 'Pay Now';
                            }
                        }
                    };

                    const rzp = new Razorpay(options);
                    rzp.open();
                })
                .catch(err => {
                    console.error(err);
                    alert('Something went wrong starting payment.');
                    payBtn.disabled = false;
                    payBtn.innerText = 'Pay Now';
                });
        });
    </script>

</body>
</html>
