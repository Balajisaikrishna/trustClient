<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustClient | Sign Up</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">

<div class="logo-icon">
TC
</div>

<div class="logo-text">
<span>Trust</span>Client
</div>

</div>

<div class="header-right">

<button id="themeToggle" class="theme-btn">
🌙
</button>

<a href="login.html" class="login-btn">
Login →
</a>

</div>

</header>

<main>

<div class="card">

<h1>Create your account</h1>

<p class="subtitle">
Start selling securely on TrustClient.
</p>

<form id="signupForm">

<div class="input-group">

<label>Username</label>

<input
type="text"
id="userName"
placeholder="Choose a username"
required>

</div>

<div class="input-group">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="emailId"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Phone</label>

<input
type="text"
id="phone"
placeholder="Phone number">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Create a password"
required>

</div>

<button
type="submit"
class="submit-btn">

Create Account

</button>

<p id="message"></p>

</form>

<div class="bottom-text">

Already have an account?

<a href="login.html">
Login
</a>

</div>

</div>

</main>

<script>

const btn=document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
btn.innerHTML="☀️";
}

btn.onclick=()=>{

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
localStorage.setItem("theme","light");
btn.innerHTML="☀️";
}else{
localStorage.setItem("theme","dark");
btn.innerHTML="🌙";
}

};

const API_URL='https://trustclient-production.up.railway.app';

document.getElementById('signupForm').addEventListener('submit',async(e)=>{

e.preventDefault();

const userName=document.getElementById('userName').value;
const name=document.getElementById('name').value;
const emailId=document.getElementById('emailId').value;
const phone=document.getElementById('phone').value;
const password=document.getElementById('password').value;

const res=await fetch(`${API_URL}/freelancer/signup`,{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
userName,
name,
emailId,
phone,
password
})

});

const data=await res.json();

if(res.ok){

document.getElementById("message").innerText="Signup successful! Redirecting...";

setTimeout(()=>{
window.location.href="login.html";
},1500);

}else{

document.getElementById("message").innerText=data.error||"Signup failed";

}

});

</script>

</body>
</html>
