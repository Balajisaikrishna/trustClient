<!DOCTYPE html>
<html>
<head>
<title>TrustClient | Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
<div class="brand">
<div class="brand-icon">T</div>
<div class="brand-name">TrustClient</div>
</div>
<div class="top-actions">
<button class="theme-btn" id="themeToggle">☾</button>
<a class="nav-btn" href="index.html">Don't have an account? Sign Up</a>
</div>
</header>

<main class="auth-container">
<div class="auth-card login-card">

<div class="auth-header">
<h1>Welcome Back</h1>
<p>Login to manage your TrustClient workspace.</p>
</div>

<form id="loginForm">

<div class="input-box">
<label>Username</label>
<input type="text" id="userName" placeholder="Enter username" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>
</div>

<button class="primary-btn" type="submit">Login</button>

</form>

<p id="message"></p>

</div>
</main>

<script>
const themeToggle=document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
themeToggle.innerText="☀";
}

themeToggle.addEventListener("click",()=>{
document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
localStorage.setItem("theme","light");
themeToggle.innerText="☀";
}else{
localStorage.setItem("theme","dark");
themeToggle.innerText="☾";
}
});
</script>

<script>
const API_URL='https://trustclient-production.up.railway.app';

document.getElementById('loginForm').addEventListener('submit',async(e)=>{
e.preventDefault();

const userName=document.getElementById('userName').value;
const password=document.getElementById('password').value;

const res=await fetch(`${API_URL}/freelancer/login`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({userName,password})
});

const data=await res.json();

if(res.ok){
localStorage.setItem('token',data.token);
localStorage.setItem('userName',userName);
window.location.href='dashboard.html';
}else{
document.getElementById('message').innerText=data.error||'Login failed';
}
});
</script>

</body>
</html>
