<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #productGrid { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; width: 220px; padding: 10px; }
    .card img, .card video { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    .addCard { display: flex; align-items: center; justify-content: center; font-size: 48px; cursor: pointer; color: #888; }
    #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    #modalBox { background: white; padding: 20px; border-radius: 8px; width: 300px; }
    .sendBtn { margin-top: 8px; }
    .linkResult { word-break: break-all; font-size: 12px; margin-top: 6px; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="dashboard-header">

<div class="logo">

<div class="logo-icon">
TC
</div>

<div class="logo-text">
<span>Trust</span>Client
</div>

</div>

<div class="header-actions">

<button id="themeToggle" class="theme-btn">
🌙
</button>

<button id="logoutBtn" class="logout-btn">
Logout
</button>

</div>

</header>

<main class="dashboard">

<div class="dashboard-top">

<div>

<h1 class="welcome-title">

Welcome back,

<span id="welcomeName"></span>

</h1>

<p class="welcome-subtitle">

Manage your digital products securely.

</p>

</div>

</div>

<section class="products-section">

<div class="section-header">

<h2>

My Products

</h2>

</div>

<div id="productGrid" class="product-grid">

</div>

</section>

</main>

<div id="modalOverlay">

<div id="modalBox">

<div class="modal-header">

<h2>

Upload Product

</h2>

<button
type="button"
id="closeModal"
class="close-modal">

✕

</button>

</div>

<form id="uploadForm">

<div class="input-group">

<label>

Price

</label>

<input
type="number"
id="product_price"
placeholder="Price (INR)"
required>

</div>

<div class="input-group">

<label>

Description

</label>

<textarea
id="description"
placeholder="Describe your product"
required>

</textarea>

</div>

<div class="input-group">

<label>

Select File

</label>

<input
type="file"
id="file"
required>

</div>

<div class="modal-buttons">

<button
type="submit"
class="submit-btn">

Upload Product

</button>

<button
type="button"
id="closeModal2"
class="cancel-btn">

Cancel

</button>

</div>

<p id="uploadMessage"></p>

</form>

</div>

</div>
<script>

const API_URL='https://trustclient-production.up.railway.app';

const token=localStorage.getItem('token');
const userName=localStorage.getItem('userName');

if(!token) window.location.href='login.html';

document.getElementById('welcomeName').innerText=userName;

const themeBtn=document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
themeBtn.innerHTML="☀️";
}

themeBtn.onclick=()=>{

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
localStorage.setItem("theme","light");
themeBtn.innerHTML="☀️";
}else{
localStorage.setItem("theme","dark");
themeBtn.innerHTML="🌙";
}

};

document.getElementById("logoutBtn").onclick=()=>{

localStorage.removeItem("token");
localStorage.removeItem("userName");

window.location.href="login.html";

};

async function loadProducts(){

const res=await fetch(`${API_URL}/freelancer/products`,{

headers:{
'Authorization':'Bearer '+token
}

});

const products=await res.json();

const grid=document.getElementById("productGrid");

grid.innerHTML="";

const add=document.createElement("div");

add.className="card addCard";

add.innerHTML=`

<div class="plus">

+

</div>

<p>

Upload Product

</p>

`;

add.onclick=()=>{

document.getElementById("modalOverlay").style.display="flex";

};

grid.appendChild(add);

products.forEach(p=>{

const card=document.createElement("div");

card.className="card";

const preview=`${API_URL}/${p.watermark_file_path}`;

const isVideo=p.watermark_file_path.endsWith(".mp4");

card.innerHTML=`

<div class="preview">

${
isVideo
?
`<video src="${preview}" controls></video>`
:
`<img src="${preview}">`
}

</div>

<div class="product-info">

<h3>

₹${p.product_price}

</h3>

<p>

${p.description}

</p>

<button
class="sendBtn"
data-id="${p.prod_id}">

Generate Secure Link

</button>

<p class="linkResult"></p>

</div>

`;

grid.appendChild(card);

});

}

document.getElementById("closeModal").onclick=()=>{

document.getElementById("modalOverlay").style.display="none";

};

document.getElementById("closeModal2").onclick=()=>{

document.getElementById("modalOverlay").style.display="none";

};

document.getElementById("uploadForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const btn=e.target.querySelector('button[type="submit"]');

btn.disabled=true;

btn.innerText="Uploading...";

const formData=new FormData();

formData.append("product_price",document.getElementById("product_price").value);

formData.append("description",document.getElementById("description").value);

formData.append("file",document.getElementById("file").files[0]);

try{

const res=await fetch(`${API_URL}/freelancer/products`,{

method:"POST",

headers:{
'Authorization':'Bearer '+token
},

body:formData

});

const data=await res.json();

if(res.ok){

document.getElementById("uploadMessage").innerText="Uploaded Successfully.";

document.getElementById("uploadForm").reset();

await loadProducts();

setTimeout(()=>{

document.getElementById("modalOverlay").style.display="none";

document.getElementById("uploadMessage").innerText="";

},1000);

}else{

document.getElementById("uploadMessage").innerText=data.error||"Upload failed";

}

}catch{

document.getElementById("uploadMessage").innerText="Something went wrong.";

}

btn.disabled=false;

btn.innerText="Upload Product";

});

document.getElementById("productGrid").addEventListener("click",async(e)=>{

if(e.target.classList.contains("sendBtn")){

const id=e.target.dataset.id;

e.target.disabled=true;

e.target.innerText="Generating...";

const res=await fetch(`${API_URL}/freelancer/products/${id}/send`,{

method:"POST",

headers:{
'Authorization':'Bearer '+token
}

});

const data=await res.json();

const result=e.target.nextElementSibling;

if(res.ok){

result.innerHTML=`
<a href="${data.link}" target="_blank">Open Link</a>

<button class="copyBtn">

Copy

</button>
`;

result.querySelector(".copyBtn").onclick=()=>{

navigator.clipboard.writeText(data.link);

alert("Copied!");

};

}else{

result.innerText=data.error||"Failed";

}

e.target.disabled=false;

e.target.innerText="Generate Secure Link";

}

});

loadProducts();

</script>
