<!DOCTYPE html>
<html>
<head>
<title>TrustClient | Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar dashboard-bar">
  <div class="brand">
    <div class="brand-icon">T</div>
    <div class="brand-name">TrustClient</div>
  </div>
  <div class="top-actions">
    <button class="theme-btn" id="themeToggle">☾</button>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</header>

<main class="dashboard-container">
  <section class="dashboard-hero">
    <div>
      <h1>Welcome, <span id="welcomeName"></span></h1>
      <p>Manage your products and securely share them with clients.</p>
    </div>
  </section>

  <section class="products-area">
    <div class="section-title">
      <h2>My Products</h2>
    </div>
    <div id="productGrid" class="product-grid"></div>
  </section>
</main>

<!-- Upload Modal -->
<div id="modalOverlay">
  <div id="modalBox">
    <div class="modal-header">
      <h3>Upload New Product</h3>
    </div>

    <form id="uploadForm">
      <div class="input-box">
        <label>Price</label>
        <input type="number" id="product_price" placeholder="Price (INR)" required>
      </div>
      <div class="input-box">
        <label>Description</label>
        <textarea id="description" placeholder="Description" required></textarea>
      </div>

      <!-- Styled file input -->
      <div class="input-box">
        <label>File</label>
        <div class="file-input-wrapper">
          <input type="file" id="file" required>
          <span class="file-input-label">Choose file</span>
        </div>
      </div>

      <div class="modal-actions">
        <button type="submit" class="primary-btn">Upload</button>
        <button type="button" id="closeModal" class="cancel-btn">Cancel</button>
      </div>
    </form>
    <p id="uploadMessage"></p>
  </div>
</div>

<script>
  // ── theme toggle ──
  const themeToggle = document.getElementById("themeToggle");
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
    themeToggle.innerText = "☀";
  }
  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("light");
    if (document.body.classList.contains("light")) {
      localStorage.setItem("theme", "light");
      themeToggle.innerText = "☀";
    } else {
      localStorage.setItem("theme", "dark");
      themeToggle.innerText = "☾";
    }
  });

  // ── constants ──
  const API_URL = 'https://trust-client-rose.vercel.app';
  const token = localStorage.getItem('token');
  const userName = localStorage.getItem('userName');
  if (!token) window.location.href = 'login.html';
  document.getElementById('welcomeName').innerText = userName;

  // ── file input label update ──
  const fileInput = document.getElementById('file');
  const fileLabel = document.querySelector('.file-input-label');
  fileInput.addEventListener('change', function() {
  if (this.files && this.files.length > 0) {
    fileLabel.textContent = this.files[0].name;
    fileLabel.classList.add('file-selected');   // <-- add this
  } else {
    fileLabel.textContent = 'Choose file';
    fileLabel.classList.remove('file-selected'); // <-- and this
  }
});

  // ── fullscreen overlay for card previews ──
  // Add overlay dynamically to body (or it can exist in HTML; we'll create it in JS)
  let glassOverlay, glassContent, glassClose;
  function ensureOverlay() {
    if (!document.getElementById('glassOverlay')) {
      const overlay = document.createElement('div');
      overlay.id = 'glassOverlay';
      overlay.className = 'glass-overlay';
      overlay.innerHTML = `
        <button class="glass-close" id="glassClose" title="Close preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <div class="glass-content" id="glassContent"></div>
      `;
      document.body.appendChild(overlay);
    }
    glassOverlay = document.getElementById('glassOverlay');
    glassContent = document.getElementById('glassContent');
    glassClose = document.getElementById('glassClose');

    // close events
    glassClose.addEventListener('click', closeGlass);
    glassOverlay.addEventListener('click', function(e) {
      if (e.target === glassOverlay) closeGlass();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && glassOverlay.classList.contains('active')) {
        closeGlass();
      }
    });
  }
  function closeGlass() {
    glassOverlay.classList.remove('active');
    document.body.style.overflow = '';
    glassContent.innerHTML = '';
  }
  function openGlass(src, isVideo) {
    ensureOverlay();
    glassContent.innerHTML = isVideo
      ? `<video src="${src}" controls autoplay playsinline></video>`
      : `<img src="${src}" alt="Fullscreen preview">`;
    glassOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  // ── load products ──
  async function loadProducts() {
    const res = await fetch(`${API_URL}/freelancer/products`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) {
      console.error('Failed to load products');
      return;
    }
    const products = await res.json();
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';

    // Add card
    const addCard = document.createElement('div');
    addCard.className = 'card addCard';
    addCard.innerText = '+';
    addCard.addEventListener('click', () => {
      document.getElementById('modalOverlay').style.display = 'flex';
    });
    grid.appendChild(addCard);

    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';

      const previewUrl = `${API_URL}/${p.watermark_file_path}`;
      const isVideo = p.watermark_file_path.endsWith('.mp4');

      card.innerHTML = `
        <div class="preview-thumbnail" data-preview="${previewUrl}" data-video="${isVideo}">
          ${isVideo
            ? `<video src="${previewUrl}" muted preload="metadata"></video>`
            : `<img src="${previewUrl}" alt="Preview">`}
        </div>
        <p>${p.description}</p>
        <strong>₹${p.product_price}</strong>
        <button class="sendBtn" data-id="${p.prod_id}">Generate Link</button>
        <p class="linkResult"></p>
        <button class="deleteBtn" data-id="${p.prod_id}">🗑 Delete</button>
      `;
      grid.appendChild(card);
    });

    // Attach click event for fullscreen on thumbnails
    document.querySelectorAll('.preview-thumbnail').forEach(thumb => {
      thumb.addEventListener('click', function(e) {
        // Don't open fullscreen if the click came from a video's controls
        if (e.target.tagName === 'VIDEO' && e.target.controls) return;
        const src = this.dataset.preview;
        const isVideo = this.dataset.video === 'true';
        openGlass(src, isVideo);
      });
    });
  }

  // ── delete handler ──
  document.getElementById('productGrid').addEventListener('click', async (e) => {
    if (e.target.classList.contains('deleteBtn')) {
      const prodId = e.target.dataset.id;
      if (!confirm('Are you sure you want to delete this product?')) return;

      const btn = e.target;
      btn.disabled = true;
      btn.innerText = 'Deleting...';

      try {
        const res = await fetch(`${API_URL}/freelancer/products/${prodId}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          await loadProducts();
        } else {
          const data = await res.json();
          alert(data.error || 'Delete failed');
          btn.disabled = false;
          btn.innerText = '🗑 Delete';
        }
      } catch (err) {
        alert('Network error');
        btn.disabled = false;
        btn.innerText = '🗑 Delete';
      }
    }
  });

  // ── close modal ──
  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('modalOverlay').style.display = 'none';
    // reset file label
    fileLabel.textContent = 'Choose file';
  });

  // ── upload form ──
  document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerText = 'Uploading...';

    const formData = new FormData();
    formData.append('product_price', document.getElementById('product_price').value);
    formData.append('description', document.getElementById('description').value);
    formData.append('file', document.getElementById('file').files[0]);

    try {
      const res = await fetch(`${API_URL}/freelancer/products`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('uploadMessage').innerText = 'Uploaded successfully!';
        document.getElementById('uploadForm').reset();
        fileLabel.textContent = 'Choose file';
        await loadProducts();
        setTimeout(() => {
          document.getElementById('modalOverlay').style.display = 'none';
          document.getElementById('uploadMessage').innerText = '';
        }, 1000);
      } else {
        document.getElementById('uploadMessage').innerText = data.error || 'Upload failed';
      }
    } catch (err) {
      document.getElementById('uploadMessage').innerText = 'Something went wrong.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerText = 'Upload';
    }
  });

  // ── generate link ──
  document.getElementById('productGrid').addEventListener('click', async (e) => {
    if (e.target.classList.contains('sendBtn')) {
      const prodId = e.target.dataset.id;
      e.target.disabled = true;
      e.target.innerText = 'Generating...';

      const res = await fetch(`${API_URL}/freelancer/products/${prodId}/send`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const resultP = e.target.nextElementSibling;

      if (res.ok) {
        resultP.innerHTML = `
          <a href="${data.link}" target="_blank">Open Link</a>
          <button type="button" class="copyBtn">Copy</button>
        `;
        resultP.querySelector('.copyBtn').addEventListener('click', () => {
          navigator.clipboard.writeText(data.link);
          alert('Link copied!');
        });
      } else {
        resultP.innerText = data.error || 'Failed to generate link';
      }
      e.target.disabled = false;
      e.target.innerText = 'Generate Link';
    }
  });

  // initial load
  loadProducts();
</script>
</body>
</html>
