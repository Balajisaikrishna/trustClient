<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #productGrid { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; width: 220px; padding: 10px; }
    .card img, .card video { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    .addCard { display: flex; align-items: center; justify-content: center; font-size: 48px; cursor: pointer; color: #888; }
    #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    #modalBox { background: white; padding: 20px; border-radius: 8px; width: 300px; }
    .sendBtn { margin-top: 8px; }
    .linkResult { word-break: break-all; font-size: 12px; margin-top: 6px; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Welcome, <span id="welcomeName"></span></h2>
  <button id="logoutBtn">Logout</button>
 
  <h3>My Products</h3>
  <div id="productGrid"></div>
 
  <!-- Modal (hidden by default) -->
  <div id="modalOverlay">
    <div id="modalBox">
      <h3>Upload New Product</h3>
      <form id="uploadForm">
        <input type="number" id="product_price" placeholder="Price (INR)" required><br><br>
        <textarea id="description" placeholder="Description" required></textarea><br><br>
        <input type="file" id="file" required><br><br>
        <button type="submit">Upload</button>
        <button type="button" id="closeModal">Cancel</button>
      </form>
      <p id="uploadMessage"></p>
    </div>
  </div>
 
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token');
    const userName = localStorage.getItem('userName');
 
    if (!token) window.location.href = 'login.html';
    document.getElementById('welcomeName').innerText = userName;
 
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('userName');
      window.location.href = 'login.html';
    });
 
    // Load and render products as cards
    async function loadProducts() {
      const res = await fetch(`${API_URL}/freelancer/products`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const products = await res.json();
 
      const grid = document.getElementById('productGrid');
      grid.innerHTML = ''; // clear before re-rendering
 
      // Add card always shown first
      const addCard = document.createElement('div');
      addCard.className = 'card addCard';
      addCard.innerText = '+';
      addCard.addEventListener('click', () => {
        document.getElementById('modalOverlay').style.display = 'flex';
      });
      grid.appendChild(addCard);
 
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
 
        const previewUrl = `${API_URL}/${p.watermark_file_path}`;
        const isVideo = p.watermark_file_path.endsWith('.mp4');
 
        card.innerHTML = `
          ${isVideo
            ? `<video src="${previewUrl}" controls></video>`
            : `<img src="${previewUrl}" />`}
          <p>${p.description}</p>
          <strong>₹${p.product_price}</strong><br>
          <button class="sendBtn" data-id="${p.prod_id}">Generate Link</button>
          <p class="linkResult"></p>
        `;
        grid.appendChild(card);
      });
    }
 
    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('modalOverlay').style.display = 'none';
    });
 
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
 
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerText = 'Uploading...';
 
      const formData = new FormData();
      formData.append('product_price', document.getElementById('product_price').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('file', document.getElementById('file').files[0]);
 
      try {
        const res = await fetch(`${API_URL}/freelancer/products`,  {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });
        const data = await res.json();
 
        if (res.ok) {
          document.getElementById('uploadMessage').innerText = 'Uploaded successfully!';
          document.getElementById('uploadForm').reset();
          await loadProducts(); // refresh the grid so the new product appears immediately
          setTimeout(() => {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('uploadMessage').innerText = '';
          }, 1000);
        } else {
          document.getElementById('uploadMessage').innerText = data.error || 'Upload failed';
        }
      } catch (err) {
        document.getElementById('uploadMessage').innerText = 'Something went wrong.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Upload';
      }
    });
 
    // Event delegation: one listener on the grid catches clicks on any current OR future sendBtn
    document.getElementById('productGrid').addEventListener('click', async (e) => {
      if (e.target.classList.contains('sendBtn')) {
        const prodId = e.target.dataset.id;
        e.target.disabled = true;
        e.target.innerText = 'Generating...';
 
        const res = await fetch(`${API_URL}/freelancer/products/${prodId}/send`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
 
        const resultP = e.target.nextElementSibling;
        if (res.ok) {
          resultP.innerHTML = `<a href="${data.link}" target="_blank">Open Link</a> <button type="button" class="copyBtn">Copy</button>`;
          resultP.querySelector('.copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(data.link);
            alert('Link copied!');
          });
        } else {
          resultP.innerText = data.error || 'Failed to generate link';
        }
        e.target.disabled = false;
        e.target.innerText = 'Generate Link';
      }
    });
 
    loadProducts(); // run once when the page first loads
  </script>
</body>
</html>
